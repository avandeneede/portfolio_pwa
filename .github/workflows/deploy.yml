name: Deploy to GitHub Pages

# Build artifact = the whole repo (pure static, no build step), minus
# private/test/fixture/reference directories. We upload a pruned tarball
# so that no synthetic fixtures or reference Python code ship to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Pre-deploy gate. The full test matrix runs on every push via test.yml;
      # this is a belt-and-braces re-check before publishing to Pages. If any
      # of these fail, the deploy is aborted.
      - name: Version lockstep
        run: node tools/release.mjs --check

      - name: Locale parity
        run: node tests/locales/run.mjs

      - name: Smoke
        run: node tests/smoke/run.mjs

      - name: Analyzer snapshot
        run: node tests/snapshot/run.mjs

      - name: Type check
        run: npx -y -p typescript@^6 tsc --noEmit

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          # Copy everything except dev-only and sensitive directories
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='tools' \
            --exclude='docs' \
            --exclude='reference' \
            --exclude='private' \
            --exclude='fixtures' \
            --exclude='node_modules' \
            --exclude='tsconfig.json' \
            --exclude='README.md' \
            --exclude='*.xlsx' \
            --exclude='*.xls' \
            --exclude='*.sqlite' \
            --exclude='*.db' \
            --exclude='*.ptf' \
            --exclude='__pycache__' \
            ./ _site/
          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages via API on first run so the deploy doesn't fail with
          # "Pages not configured". Safe to leave on: no-op after enablement.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
