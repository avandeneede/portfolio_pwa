<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Minimalist portfolio mark: a single donut ring, with one arc segment
       highlighted to evoke a portfolio breakdown. Deep-navy tile keeps it
       calm on a crowded home screen. -->
  <rect width="512" height="512" rx="112" fill="#0b1020"/>
  <g transform="translate(256 256)">
    <!-- Full ring -->
    <circle r="128" fill="none" stroke="#ffffff" stroke-width="44"/>
    <!-- Accent arc (~35% of the circumference), starting at the top.
         Circumference = 2π·128 ≈ 804.25; arc = 282, gap = 523. -->
    <circle r="128" fill="none" stroke="#5ac8fa" stroke-width="44"
            stroke-dasharray="282 523" stroke-linecap="butt"
            transform="rotate(-90)"/>
  </g>
</svg>
